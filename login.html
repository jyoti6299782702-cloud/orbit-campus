<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Campus - Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

    <div class="login-box">

        <div class="logo">
            <i class="fa-solid fa-satellite"></i>
            <h2>Orbit Campus</h2>
        </div>

        <h1>Welcome Back</h1>

        <p>Login to continue</p>

        <form id="loginForm">

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <a href="index.html">
            ← Back to Home
        </a>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
