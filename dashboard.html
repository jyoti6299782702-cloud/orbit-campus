<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Campus Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-satellite"></i>
        <h2>Orbit Campus</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="report.html">Report Complaint</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="admin.html">Admin</a>
    </nav>

</header>

<!-- Statistics Cards -->

<section class="cards">

    <div class="card total">
        <i class="fa-solid fa-file-circle-exclamation"></i>
        <h3>Total Complaints</h3>
        <h1 id="totalComplaints">0</h1>
    </div>

    <div class="card pending">
        <i class="fa-solid fa-clock"></i>
        <h3>Pending</h3>
        <h1 id="pendingComplaints">0</h1>
    </div>

    <div class="card progress">
        <i class="fa-solid fa-spinner"></i>
        <h3>In Progress</h3>
        <h1 id="progressComplaints">0</h1>
    </div>

    <div class="card resolved">
        <i class="fa-solid fa-circle-check"></i>
        <h3>Resolved</h3>
        <h1 id="resolvedComplaints">0</h1>
    </div>

    <div class="card high">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h3>High Priority</h3>
        <h1 id="highComplaints">0</h1>
    </div>

</section>

<!-- Search & Filter -->

<section class="filters">

    <input
        type="text"
        id="search"
        placeholder="🔍 Search by Name / Roll / Complaint ID">

    <select id="categoryFilter">
        <option value="">All Categories</option>
        <option>Electricity</option>
        <option>Water</option>
        <option>WiFi</option>
        <option>Cleaning</option>
        <option>Other</option>
    </select>

    <select id="priorityFilter">
        <option value="">All Priority</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <select id="statusFilter">
        <option value="">All Status</option>
        <option>Pending</option>
        <option>In Progress</option>
        <option>Resolved</option>
    </select>

</section>

<!-- Complaint Table -->

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Roll No</th>

<th>Department</th>

<th>Category</th>

<th>Priority</th>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="complaintTable">

</tbody>

</table>

</div>

<!-- View Complaint Popup -->

<div class="modal" id="viewModal">

<div class="modal-content">

<span class="close">&times;</span>

<h2>Complaint Details</h2>

<div id="complaintDetails"></div>

</div>

</div>

<script src="js/dashboard.js"></script>


</body>
</html>
