<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orbit Campus Admin</title>

<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="header">

<h2>
<i class="fa-solid fa-user-shield"></i>
Admin Dashboard
</h2>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="report.html">New Complaint</a>

<a href="index.html">Home</a>

</nav>

</header>

<section class="cards">

<div class="card">
<h3>Total</h3>
<h1 id="total">0</h1>
</div>

<div class="card">
<h3>Pending</h3>
<h1 id="pending">0</h1>
</div>

<div class="card">
<h3>Resolved</h3>
<h1 id="resolved">0</h1>
</div>

</section>

<div class="table-container">

<input
type="text"
id="search"
placeholder="Search Complaint">

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Category</th>

<th>Priority</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="adminTable">

</tbody>

</table>

</div>

<!-- View Modal -->

<div class="modal" id="modal">

<div class="modal-content">

<span id="close">&times;</span>

<h2>Complaint Details</h2>

<div id="details"></div>

</div>

</div>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>


</body>

</html>
