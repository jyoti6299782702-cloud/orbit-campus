<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Complaint | Orbit Campus</title>

<link rel="stylesheet" href="css/report.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

<div class="report-box">

<h1><i class="fa-solid fa-circle-exclamation"></i> Report Complaint</h1>

<p>Fill all the details carefully.</p>

<form id="reportForm">

<h3>Student Information</h3>

<input type="text" id="name" placeholder="Student Name" required>

<input type="text" id="roll" placeholder="Roll Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<h3>Academic Details</h3>

<input type="text" id="department" placeholder="Department" required>

<select id="semester" required>
<option value="">Select Semester</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<h3>Complaint Details</h3>

<select id="category" required>
<option value="">Select Category</option>
<option>WiFi</option>
<option>Library</option>
<option>Laboratory</option>
<option>Classroom</option>
<option>Hostel</option>
<option>Electricity</option>
<option>Water</option>
<option>Cleaning</option>
<option>Other</option>
</select>

<input type="text" id="building" placeholder="Building Name">

<input type="text" id="room" placeholder="Room Number">

<select id="priority" required>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<textarea id="description" rows="5"
placeholder="Describe your complaint..." required></textarea>

<label>Upload Image (Optional)</label>
<input type="file" id="image" accept="image/*">

<button type="submit">
<i class="fa-solid fa-paper-plane"></i>
Submit Complaint
</button>

</form>

</div>

</div>

<script src="js/auth.js"></script>
<script src="js/report.js"></script>

</body>
</html>
